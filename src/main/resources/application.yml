spring:
  application:
    name: p2p-lending
  datasource:
    url: jdbc:postgresql://localhost:5432/p2plending
    username: p2p
    password: p2p
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

p2p:
  funding:
    window-days: 14
    expiry-check-cron: "0 0 * * * *"

logging:
  level:
    org.hibernate.SQL: debug